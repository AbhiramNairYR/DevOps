<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteBuild - Parts Catalog</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { color: #333; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 10px; border: 1px solid #ccc; text-align: left; }
        th { background-color: #007bff; color: white; }
        nav { text-align: center; margin-bottom: 20px; }
        nav a { padding: 10px 20px; text-decoration: none; background-color: #28a745; color: white; border-radius: 5px; font-weight: bold; }
        nav a:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <a href="index.html">← Back to PC Builder</a>
        </nav>

        <h1>Live Parts Catalog</h1>
        <p style="text-align: center; color: #666;">Fetching live inventory from the Catalog Microservice...</p>

        <h2>CPUs</h2>
        <table id="cpu-table">
            <tr><th>Name</th><th>Socket</th><th>Price</th></tr>
        </table>

        <h2>Motherboards</h2>
        <table id="mobo-table">
            <tr><th>Name</th><th>Form Factor</th><th>Socket</th><th>Price</th></tr>
        </table>

        <h2>GPUs</h2>
        <table id="gpu-table">
            <tr><th>Name</th><th>Fans</th><th>Price</th></tr>
        </table>

        <h2>Cases</h2>
        <table id="case-table">
            <tr><th>Name</th><th>Size</th><th>Max GPU Fans</th><th>Max Form Factor</th><th>Price</th></tr>
        </table>
    </div>

    <script>
        // Fetch parts from the Node.js Catalog Service
        async function loadCatalog() {
            try {
                const response = await fetch('http://localhost:3000/api/parts');
                const data = await response.json();

                const cpuTable = document.getElementById('cpu-table');
                data.cpus.forEach(cpu => {
                    cpuTable.innerHTML += `<tr><td>${cpu.name}</td><td>${cpu.socket}</td><td>$${cpu.price}</td></tr>`;
                });

                const moboTable = document.getElementById('mobo-table');
                data.motherboards.forEach(mobo => {
                    moboTable.innerHTML += `<tr><td>${mobo.name}</td><td>${mobo.formFactor}</td><td>${mobo.socket}</td><td>$${mobo.price}</td></tr>`;
                });

                const gpuTable = document.getElementById('gpu-table');
                data.gpus.forEach(gpu => {
                    gpuTable.innerHTML += `<tr><td>${gpu.name}</td><td>${gpu.fans}</td><td>$${gpu.price}</td></tr>`;
                });

                const caseTable = document.getElementById('case-table');
                data.cases.forEach(pcCase => {
                    caseTable.innerHTML += `<tr><td>${pcCase.name}</td><td>${pcCase.size}</td><td>${pcCase.maxGpuFans}</td><td>${pcCase.maxFormFactor}</td><td>$${pcCase.price}</td></tr>`;
                });
            } catch (error) {
                console.error("Error fetching catalog:", error);
                document.querySelector('p').innerText = "⚠️ Error loading catalog. Is the catalog service running?";
                document.querySelector('p').style.color = "red";
            }
        }

        // Run function on page load
        window.onload = loadCatalog;
    </script>
</body>
</html>
