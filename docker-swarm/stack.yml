version: '3.8'

services:
  web-store:
    image: bytebuild/web-store:local
    ports:
      - target: 80
        published: 8088
        protocol: tcp
        mode: ingress
    networks:
      - bytebuild-net
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure

  catalog:
    image: bytebuild/catalog:local
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        mode: ingress
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - bytebuild-net
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 3

  logic-engine:
    image: bytebuild/logic-engine:local
    ports:
      - target: 5000
        published: 5000
        protocol: tcp
        mode: ingress
    networks:
      - bytebuild-net
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health', timeout=2).status == 200 else 1)\""]
      interval: 10s
      timeout: 3s
      retries: 3

networks:
  bytebuild-net:
    driver: overlay
