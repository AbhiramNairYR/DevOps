name: ByteBuild CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract web-store metadata
        id: web-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/web-store
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}

      - name: Build web-store image
        uses: docker/build-push-action@v6
        with:
          context: ./services/web-store
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.web-meta.outputs.tags }}

      - name: Extract catalog metadata
        id: catalog-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/catalog
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}

      - name: Build catalog image
        uses: docker/build-push-action@v6
        with:
          context: ./services/catalog
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.catalog-meta.outputs.tags }}

      - name: Extract logic-engine metadata
        id: logic-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/logic-engine
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}

      - name: Build logic-engine image
        uses: docker/build-push-action@v6
        with:
          context: ./services/logic-engine
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.logic-meta.outputs.tags }}

      - name: Summarize
        run: |
          echo "Built images for web-store, catalog, and logic-engine."
          echo "Pushes happen on main only; pull requests run build validation only."