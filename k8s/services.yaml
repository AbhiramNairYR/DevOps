# Web Store NodePort (local cluster access)
apiVersion: v1
kind: Service
metadata:
  name: web-store-service
spec:
  type: NodePort
  selector:
    app: web-store
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080

---
# Catalog Service (Internal only)
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
spec:
  type: NodePort
  selector:
    app: catalog
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30000

---
# Logic Engine Service (Internal only)
apiVersion: v1
kind: Service
metadata:
  name: logic-engine-service
spec:
  type: NodePort
  selector:
    app: logic-engine
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30050